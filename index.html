<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dome Timeline</title>

  <style>
    :root {
      --bg: #e9e2d3;
      --panel: #d8cfbe;
      --text: #2f261d;
      --muted: #7b6e5f;
      --line: #b5aa97;
      --accent: #8d7558;
      --shadow: 0 1px 0 rgba(47, 38, 29, 0.03);
    }

    * { box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
        "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 400;
      letter-spacing: -0.01em;
      -webkit-font-smoothing: antialiased;
      background: var(--bg);
      color: var(--text);
    }

    img {
      max-width: 100%;
      height: auto;
    }

    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 14px 18px 18px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .mode-badge {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .title {
      font-size: clamp(22px, 2.4vw, 34px);
      line-height: 1;
      margin: 0;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .controls,
    .slot-controls,
    .photos-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button, input {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      letter-spacing: -0.01em;
      box-shadow: var(--shadow);
    }

    input {
      min-width: 220px;
      background: rgba(255,255,255,0.35);
      font-weight: 400;
    }

    button {
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    }

    button:hover { background: #cec3b0; }
    button:active { transform: translateY(1px); }

    .active-mode-btn,
    .view-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .hidden { display: none !important; }

    .loading {
      color: var(--muted);
      padding: 20px 0;
      font-size: 14px;
    }

    #appShell {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    #timelineMode,
    #slotMode,
    #photosMode {
      flex: 1 1 auto;
      min-height: 0;
    }

    #timelineMode {
      display: flex;
      flex-direction: column;
    }

    .timeline-top-controls {
      margin-bottom: 10px;
    }

    .timeline-layout {
      display: grid;
      grid-template-columns: auto minmax(320px, 1fr);
      gap: 14px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border-radius: 20px;
      padding: 12px;
      min-width: 0;
    }

    .image-panel {
      width: fit-content;
      justify-self: start;
      padding: 0;
      overflow: hidden;
      background: transparent;
      border-radius: 20px;
    }

    .image-shell {
      width: 540px;
      max-width: min(100vw - 120px, 540px);
      padding: 0;
      margin: 0;
    }

    .image-frame {
      width: 100%;
      aspect-ratio: 0.72;
      max-height: 70vh;
      overflow: hidden;
      border-radius: 20px;
      background: transparent;
      position: relative;
      cursor: zoom-in;
      padding: 0;
    }

    .image-frame img,
    .reel-window img,
    .photo-card-image img,
    .photo-group-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      transform: translateX(0) scale(1);
      opacity: 1;
    }

    .image-frame img {
      border-radius: 20px;
    }

    .date {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .headline {
      font-size: clamp(28px, 3vw, 56px);
      line-height: 0.95;
      margin: 0 0 12px 0;
      font-weight: 600;
      letter-spacing: -0.045em;
      word-break: break-word;
    }

    .text {
      font-size: clamp(15px, 1.2vw, 18px);
      line-height: 1.4;
      margin-bottom: 10px;
      font-weight: 400;
    }

    .caption {
      font-size: 13px;
      color: var(--muted);
    }

    .timeline-strip {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
    }

    .timeline-track {
      display: flex;
      gap: 12px;
      min-width: max-content;
      padding-bottom: 8px;
    }

    .timeline-item {
      width: 98px;
      flex: 0 0 auto;
      cursor: pointer;
      position: relative;
      padding-top: 12px;
    }

    .timeline-item::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--line);
    }

    .timeline-item::after {
      content: "";
      position: absolute;
      top: -4px;
      left: 0;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
    }

    .timeline-item.active .mini-headline {
      color: var(--accent);
      font-weight: 600;
    }

    .mini-date {
      font-size: 9px;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      line-height: 1.15;
      letter-spacing: 0.06em;
      font-weight: 500;
    }

    .mini-headline {
      font-size: 11px;
      line-height: 1.1;
      letter-spacing: -0.02em;
      font-weight: 500;
      word-break: break-word;
    }

    .slot-controls {
      margin-bottom: 16px;
    }

    .slot-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .reel {
      background: var(--panel);
      border-radius: 18px;
      padding: 10px;
      min-width: 0;
    }

    .reel-window {
      width: 100%;
      aspect-ratio: 0.72;
      overflow: hidden;
      border-radius: 14px;
      background: #c8bead;
      position: relative;
      cursor: zoom-in;
    }

    .reel-caption {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      min-height: 32px;
      line-height: 1.25;
    }

    .hold-btn {
      width: 100%;
      margin-top: 10px;
    }

    .hold-btn.held {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .photos-controls {
      margin-bottom: 14px;
      justify-content: center;
    }

    .photos-segmented {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px;
      background: rgba(255,255,255,0.22);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px;
    }

    .view-btn {
      border-radius: 999px;
      box-shadow: none;
      padding: 8px 14px;
      background: transparent;
    }

    .photos-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .photos-breadcrumb {
      font-size: 14px;
      color: var(--muted);
    }

    .photos-back-btn {
      padding: 8px 12px;
    }

    .photos-grid-years,
    .photos-grid-all {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .photo-group-card {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      background: #c8bead;
      box-shadow: var(--shadow);
    }

    .photo-group-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.28), rgba(0,0,0,0.02));
      pointer-events: none;
    }

    .photo-group-label {
      position: absolute;
      left: 16px;
      top: 16px;
      z-index: 2;
      color: #fff;
      font-size: clamp(28px, 3vw, 54px);
      font-weight: 700;
      letter-spacing: -0.04em;
      text-shadow: 0 1px 6px rgba(0,0,0,0.25);
    }

    .photos-section {
      margin-bottom: 28px;
    }

    .photos-section-title {
      font-size: clamp(28px, 3vw, 46px);
      font-weight: 700;
      letter-spacing: -0.04em;
      margin: 0 0 14px 0;
    }

    .photos-grid-months {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .photos-grid-days {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .photo-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
    }

    .photo-card-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      overflow: hidden;
      background: #c8bead;
    }

    .photo-card-meta {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.25;
    }

    .photo-card-meta strong {
      color: var(--text);
      display: block;
      font-size: 18px;
      letter-spacing: -0.02em;
      margin-bottom: 2px;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(20, 16, 12, 0.96);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 9999;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox-inner {
      position: relative;
      width: min(96vw, 1700px);
      height: min(96vh, 1200px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      border-radius: 12px;
      background: transparent;
    }

    .lightbox-close {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.14);
      color: white;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: none;
    }

    .lightbox-close:hover {
      background: rgba(255,255,255,0.22);
    }

    @media (max-width: 1100px) {
      .timeline-layout {
        grid-template-columns: 1fr;
      }

      .image-panel {
        width: 100%;
      }

      .image-shell {
        width: 100%;
        max-width: 500px;
        margin: 0 auto;
      }

      .slot-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .photos-grid-years,
      .photos-grid-all {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .photos-grid-days {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .photos-grid-months {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .wrap {
        padding: 12px;
      }

      .title {
        font-size: 22px;
      }

      .image-shell {
        width: 100%;
        max-width: 420px;
      }

      .image-frame {
        max-height: 62vh;
      }

      .headline {
        font-size: 34px;
      }

      .text {
        font-size: 15px;
      }

      .timeline-item {
        width: 90px;
      }

      .slot-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .photos-grid-years,
      .photos-grid-all {
        grid-template-columns: 1fr;
      }

      .photos-grid-days {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      input {
        min-width: 0;
        width: 100%;
      }
    }

    @media (max-width: 520px) {
      .wrap {
        padding: 10px;
      }

      .controls,
      .slot-controls,
      .photos-controls {
        width: 100%;
      }

      .controls button,
      .slot-controls button {
        flex: 1 1 auto;
      }

      .image-shell {
        max-width: 360px;
      }

      .image-frame {
        max-height: 56vh;
      }

      .headline {
        font-size: 28px;
      }

      .slot-grid,
      .photos-grid-days {
        grid-template-columns: 1fr;
      }

      .photos-segmented {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="mode-badge" id="modeBadge">Timeline Mode</div>
        <h1 class="title">Dome Archive Prototype</h1>
      </div>

      <div class="controls">
        <button id="timelineModeBtn" class="active-mode-btn">Timeline</button>
        <button id="slotModeBtn">Explore / Slot</button>
        <button id="photosModeBtn">Photos</button>
      </div>
    </div>

    <div id="loadingMessage" class="loading">Loading data…</div>

    <div id="appShell" class="hidden">
      <div id="timelineMode">
        <div class="controls timeline-top-controls">
          <button id="prevBtn">Previous</button>
          <button id="nextBtn">Next</button>
        </div>

        <div class="timeline-layout">
          <div class="panel image-panel">
            <div class="image-shell">
              <div class="image-frame">
                <img id="mainImage" src="" alt="" decoding="async" fetchpriority="high" />
              </div>
            </div>
          </div>

          <div class="panel">
            <div class="date" id="dateText"></div>
            <h2 class="headline" id="headlineText"></h2>
            <div class="text" id="bodyText"></div>
            <div class="caption" id="captionText"></div>
          </div>
        </div>

        <div class="timeline-strip">
          <div class="timeline-track" id="timelineTrack"></div>
        </div>
      </div>

      <div id="slotMode" class="hidden">
        <div class="slot-controls">
          <input id="searchInput" type="text" placeholder="Search/category" value="" />
          <button id="spinBtn">Spin</button>
          <button id="hardSpinBtn">Hard Spin</button>
          <button id="clearHoldsBtn">Clear Holds</button>
        </div>

        <div class="slot-grid" id="slotGrid"></div>
      </div>

      <div id="photosMode" class="hidden">
        <div class="photos-controls">
          <div class="photos-segmented">
            <button class="view-btn active" data-view="years">Years</button>
            <button class="view-btn" data-view="months">Months</button>
            <button class="view-btn" data-view="days">Days</button>
            <button class="view-btn" data-view="all">All Photos</button>
          </div>
        </div>

        <div id="photosToolbar" class="photos-toolbar hidden"></div>
        <div id="photosContent"></div>
      </div>
    </div>
  </div>

  <div id="lightbox" class="lightbox hidden" aria-hidden="true">
    <div class="lightbox-inner">
      <button id="lightboxClose" class="lightbox-close" aria-label="Close image">×</button>
      <img id="lightboxImage" src="" alt="" decoding="async" />
    </div>
  </div>

  <script>
    const SHEET_ID = "1wDHuoi8_cpGxOwYemSWE86Oxwiz9_QIUAVNxUAhAk8A";
    const SHEET_TAB = "PUBLISH";

    const SMALL_IMAGE_PATH = "https://juliancanterbury.github.io/dome-timeline/Images/Small/";
    const LARGE_IMAGE_PATH = "https://juliancanterbury.github.io/dome-timeline/Images/Large/";

    let entries = [];
    let currentIndex = 0;
    const reelCount = 5;
    const imageCache = new Map();
    let slotPreviewPool = [];
    let currentPhotoView = "years";

    let photoNav = {
      year: null,
      month: null,
      day: null
    };

    let reelState = Array.from({ length: reelCount }, () => ({
      held: false,
      entry: null
    }));

    function cleanFileName(value) {
      return String(value ?? "").trim();
    }

    function getSmallPath(fileName) {
      return SMALL_IMAGE_PATH + encodeURI(fileName);
    }

    function getLargePath(fileName) {
      return LARGE_IMAGE_PATH + encodeURI(fileName);
    }

    async function loadSheetData() {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 12000);

      try {
        const url = `https://opensheet.elk.sh/${SHEET_ID}/${SHEET_TAB}`;
        const res = await fetch(url, {
          method: "GET",
          cache: "no-store",
          signal: controller.signal
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();

        return data
          .map((row, index) => {
            const fileName = cleanFileName(
              row.Filename ??
              row.FileName ??
              row.FILENAME ??
              row.filename ??
              ""
            );

            const year = Number(String(row.Year ?? row.YEAR ?? "").replace(/,/g, ""));
            const month = Number(String(row.Month ?? row.MONTH ?? "").replace(/,/g, ""));
            const day = Number(String(row.Day ?? row.DAY ?? "").replace(/,/g, ""));

            const headline =
              String(row.Headline ?? row.HEADLINE ?? "").trim() ||
              "Untitled";

            return {
              id: `${fileName}-${index}`,
              year: year,
              month: month,
              day: day,
              headline: headline,
              text: row.Text ?? row.TEXT ?? "",
              caption: row.Caption ?? row.CAPTION ?? "",
              fileName: fileName,
              mediaSmall: fileName ? getSmallPath(fileName) : "",
              mediaLarge: fileName ? getLargePath(fileName) : ""
            };
          })
          .filter(row =>
            row.year &&
            row.month &&
            row.day &&
            row.fileName
          )
          .sort((a, b) => {
            return new Date(a.year, a.month - 1, a.day) -
                   new Date(b.year, b.month - 1, b.day);
          });
      } finally {
        clearTimeout(timeout);
      }
    }

    function formatDate(entry) {
      const d = new Date(entry.year, entry.month - 1, entry.day);
      return d.toLocaleDateString("en-AU", {
        year: "numeric",
        month: "long",
        day: "numeric"
      });
    }

    function formatMonthTitle(year, month) {
      const d = new Date(year, month - 1, 1);
      return d.toLocaleDateString("en-AU", {
        month: "long",
        year: "numeric"
      });
    }

    function formatDayTitle(entry) {
      const d = new Date(entry.year, entry.month - 1, entry.day);
      return d.toLocaleDateString("en-AU", {
        weekday: "short",
        day: "numeric",
        month: "short"
      });
    }

    function groupKeyYear(entry) {
      return `${entry.year}`;
    }

    function groupKeyMonth(entry) {
      return `${entry.year}-${String(entry.month).padStart(2, "0")}`;
    }

    function groupKeyDay(entry) {
      return `${entry.year}-${String(entry.month).padStart(2, "0")}-${String(entry.day).padStart(2, "0")}`;
    }

    function sampleEntries(list, count) {
      const copy = [...list];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy.slice(0, Math.min(count, copy.length));
    }

    function shuffledCopy(list) {
      const copy = [...list];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function randomEntryFrom(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function buildImgTag(src, alt, extraAttrs = "") {
      return `<img src="${escapeHtml(src)}" alt="${escapeHtml(alt)}" loading="lazy" decoding="async" ${extraAttrs}>`;
    }

    function preloadImage(src) {
      return new Promise((resolve) => {
        if (!src) return resolve();
        if (imageCache.has(src)) return resolve();

        const img = new Image();

        img.onload = async () => {
          try {
            if (img.decode) await img.decode();
          } catch (e) {}

          imageCache.set(src, true);
          resolve();
        };

        img.onerror = () => resolve();
        img.src = src;
      });
    }

    async function preloadEntriesImages(list, limit = 6) {
      const targets = list.slice(0, Math.min(limit, list.length));
      await Promise.all(targets.map(entry => preloadImage(entry.mediaSmall)));
    }

    async function ensureEntryImage(entry) {
      if (!entry || !entry.mediaSmall) return;
      await preloadImage(entry.mediaSmall);
    }

function animateImageSwap(imgEl, newSrc, newAlt = "") {
  if (!newSrc) return;

  imgEl.src = newSrc;
  imgEl.alt = newAlt;
}

    function renderEntry(index) {
      if (!entries.length) return;

      const entry = entries[index];
      const mainImage = document.getElementById("mainImage");

      animateImageSwap(mainImage, entry.mediaSmall, entry.headline);
      document.getElementById("dateText").textContent = formatDate(entry);
      document.getElementById("headlineText").textContent = entry.headline;
      document.getElementById("bodyText").textContent = entry.text || "";
      document.getElementById("captionText").textContent = entry.caption || "";

      mainImage.loading = "eager";
      mainImage.decoding = "async";
      mainImage.fetchPriority = "high";

      document.querySelectorAll(".timeline-item").forEach((el, i) => {
        el.classList.toggle("active", i === index);
      });
    }

    function buildTimeline() {
      const track = document.getElementById("timelineTrack");
      track.innerHTML = "";

      entries.forEach((entry, i) => {
        const item = document.createElement("div");
        item.className = "timeline-item";
        item.innerHTML = `
          <div class="mini-date">${escapeHtml(formatDate(entry))}</div>
          <div class="mini-headline">${escapeHtml(entry.headline)}</div>
        `;
        item.addEventListener("click", () => {
          currentIndex = i;
          renderEntry(currentIndex);
          scrollTimelineItemIntoView(currentIndex);
        });
        track.appendChild(item);
      });
    }

    function filteredEntries(term) {
      const t = term.trim().toLowerCase();
      if (!t) return [...entries];

      return entries.filter(entry =>
        (entry.headline || "").toLowerCase().includes(t) ||
        (entry.text || "").toLowerCase().includes(t) ||
        (entry.caption || "").toLowerCase().includes(t) ||
        (entry.fileName || "").toLowerCase().includes(t)
      );
    }

    function buildSlotGrid() {
      const grid = document.getElementById("slotGrid");
      grid.innerHTML = "";

      for (let i = 0; i < reelCount; i++) {
        const reel = document.createElement("div");
        reel.className = "reel";
        reel.innerHTML = `
          <div class="reel-window">
            <img id="reelImg${i}" src="" alt="" loading="lazy" decoding="async" fetchpriority="low" />
          </div>
          <div class="reel-caption" id="reelCaption${i}"></div>
          <button class="hold-btn" id="holdBtn${i}">Hold</button>
        `;
        grid.appendChild(reel);
      }

      for (let i = 0; i < reelCount; i++) {
        document.getElementById(`holdBtn${i}`).addEventListener("click", () => {
          reelState[i].held = !reelState[i].held;
          updateHoldButtons();
        });

        const reelImg = document.getElementById(`reelImg${i}`);
        reelImg.addEventListener("click", () => {
          const entry = reelState[i].entry;
          if (!entry) return;
          openLightbox(entry.mediaLarge, entry.headline);
        });
      }
    }

    function updateHoldButtons() {
      for (let i = 0; i < reelCount; i++) {
        const btn = document.getElementById(`holdBtn${i}`);
        btn.textContent = reelState[i].held ? "Held" : "Hold";
        btn.classList.toggle("held", reelState[i].held);
      }
    }

    function setReelVisual(index, entry) {
      const img = document.getElementById(`reelImg${index}`);
      const caption = document.getElementById(`reelCaption${index}`);
      animateImageSwap(img, entry.mediaSmall, entry.headline);
      caption.textContent = `${entry.headline} — ${formatDate(entry)}`;
    }

    async function animateReelSpin(index, previewPool, finalEntry, stopDelay = 0) {
      await ensureEntryImage(finalEntry);
      const localPreviewPool = previewPool.length ? previewPool : [finalEntry];

      return new Promise(resolve => {
        const totalFrames = 10 + Math.floor(Math.random() * 4);
        let frame = 0;

        const startSpin = () => {
          const interval = setInterval(() => {
            const candidate = localPreviewPool[frame % localPreviewPool.length];
            setReelVisual(index, candidate);
            frame++;

            if (frame >= totalFrames) {
              clearInterval(interval);
              reelState[index].entry = finalEntry;
              setReelVisual(index, finalEntry);
              setTimeout(resolve, 90);
            }
          }, 75);
        };

        setTimeout(startSpin, stopDelay);
      });
    }

    async function spinSlot(forceAll = false) {
      const search = document.getElementById("searchInput").value;
      let pool = filteredEntries(search);
      if (!pool.length) pool = [...entries];

      const reelIndexesToSpin = [];
      for (let i = 0; i < reelCount; i++) {
        if (reelState[i].held && !forceAll) continue;
        reelIndexesToSpin.push(i);
      }

      if (!reelIndexesToSpin.length) return;

      const uniquePool = shuffledCopy(pool);
      let chosenFinals = [];

      if (!forceAll && uniquePool.length >= reelIndexesToSpin.length) {
        chosenFinals = uniquePool.slice(0, reelIndexesToSpin.length);
      } else if (!forceAll) {
        chosenFinals = [...uniquePool];
        while (chosenFinals.length < reelIndexesToSpin.length) {
          chosenFinals.push(randomEntryFrom(pool));
        }
      } else {
        for (let i = 0; i < reelIndexesToSpin.length; i++) {
          chosenFinals.push(randomEntryFrom(pool));
        }
      }

      const previewSource = uniquePool.length >= 10
        ? uniquePool.slice(0, 10)
        : uniquePool;

      slotPreviewPool = previewSource;
      await Promise.all(chosenFinals.map(entry => ensureEntryImage(entry)));

      const spinPromises = reelIndexesToSpin.map((reelIndex, i) => {
        let previewPool;

        if (forceAll) {
          previewPool = sampleEntries(pool, Math.min(6, pool.length));
        } else {
          const rotatedPreview = shuffledCopy(
            slotPreviewPool.filter(entry => entry.mediaSmall !== chosenFinals[i].mediaSmall)
          );
          previewPool = rotatedPreview.length ? rotatedPreview.slice(0, 6) : [chosenFinals[i]];
        }

        return animateReelSpin(reelIndex, previewPool, chosenFinals[i], i * 140);
      });

      await Promise.all(spinPromises);
    }

    function openLightbox(src, alt = "") {
      if (!src) return;

      const lightbox = document.getElementById("lightbox");
      const lightboxImage = document.getElementById("lightboxImage");

      lightboxImage.src = src;
      lightboxImage.alt = alt;
      lightbox.classList.remove("hidden");
      lightbox.classList.add("open");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      const lightbox = document.getElementById("lightbox");
      const lightboxImage = document.getElementById("lightboxImage");

      lightbox.classList.remove("open");
      lightbox.classList.add("hidden");
      lightbox.setAttribute("aria-hidden", "true");
      lightboxImage.src = "";
      lightboxImage.alt = "";
      document.body.style.overflow = "";
    }

    function scrollTimelineItemIntoView(index) {
      const items = document.querySelectorAll(".timeline-item");
      const target = items[index];
      if (!target) return;
      target.scrollIntoView({
        inline: "center",
        block: "nearest",
        behavior: "smooth"
      });
    }

    function groupEntriesBy(entriesList, keyFn) {
      const map = new Map();
      entriesList.forEach(entry => {
        const key = keyFn(entry);
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(entry);
      });
      return [...map.entries()];
    }

    function sortEntriesChronological(list) {
      return [...list].sort((a, b) => {
        const da = new Date(a.year, a.month - 1, a.day).getTime();
        const db = new Date(b.year, b.month - 1, b.day).getTime();
        return da - db;
      });
    }

    function sameMonth(entry, year, month) {
      return entry.year === year && entry.month === month;
    }

    function sameDay(entry, year, month, day) {
      return entry.year === year && entry.month === month && entry.day === day;
    }

    function updatePhotosToolbar() {
      const toolbar = document.getElementById("photosToolbar");

      if (currentPhotoView === "years") {
        toolbar.classList.add("hidden");
        toolbar.innerHTML = "";
        return;
      }

      let crumb = "Photos";
      if (photoNav.year) crumb += ` / ${photoNav.year}`;
      if (photoNav.month) {
        const d = new Date(photoNav.year, photoNav.month - 1, 1);
        crumb += ` / ${d.toLocaleDateString("en-AU", { month: "long" })}`;
      }
      if (photoNav.day) crumb += ` / ${photoNav.day}`;

      toolbar.classList.remove("hidden");
      toolbar.innerHTML = `
        <button class="photos-back-btn" id="photosBackBtn">Back</button>
        <div class="photos-breadcrumb">${escapeHtml(crumb)}</div>
      `;

      document.getElementById("photosBackBtn").addEventListener("click", () => {
        if (currentPhotoView === "all") {
          currentPhotoView = "days";
          photoNav.day = null;
        } else if (currentPhotoView === "days") {
          currentPhotoView = "months";
          photoNav.month = null;
          photoNav.day = null;
        } else if (currentPhotoView === "months") {
          currentPhotoView = "years";
          photoNav.year = null;
          photoNav.month = null;
          photoNav.day = null;
        }
        renderPhotosMode(currentPhotoView);
      });
    }

    function renderPhotosMode(view) {
      currentPhotoView = view;
      const content = document.getElementById("photosContent");
      let sorted = sortEntriesChronological(entries);

      document.querySelectorAll(".view-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.view === view);
      });

      if (view === "years") {
        photoNav.year = null;
        photoNav.month = null;
        photoNav.day = null;

        const byYear = groupEntriesBy(sorted, groupKeyYear);

        content.innerHTML = `
          <div class="photos-grid-years">
            ${byYear.map(([year, list]) => `
              <div class="photo-group-card" data-year="${escapeHtml(year)}">
                ${buildImgTag(list[0].mediaSmall, year, 'fetchpriority="low"')}
                <div class="photo-group-label">${escapeHtml(year)}</div>
              </div>
            `).join("")}
          </div>
        `;

        content.querySelectorAll("[data-year]").forEach(el => {
          el.addEventListener("click", () => {
            photoNav.year = Number(el.dataset.year);
            photoNav.month = null;
            photoNav.day = null;
            renderPhotosMode("months");
          });
        });
      }

      else if (view === "months") {
        if (photoNav.year) {
          sorted = sorted.filter(entry => entry.year === photoNav.year);
        }

        const byMonth = groupEntriesBy(sorted, groupKeyMonth);

        content.innerHTML = byMonth.map(([key, list]) => `
          <section class="photos-section">
            <h2 class="photos-section-title">${escapeHtml(formatMonthTitle(list[0].year, list[0].month))}</h2>
            <div class="photos-grid-months">
              <div class="photo-group-card" data-year="${list[0].year}" data-month="${list[0].month}">
                ${buildImgTag(list[0].mediaSmall, formatMonthTitle(list[0].year, list[0].month), 'fetchpriority="low"')}
                <div class="photo-group-label">
                  ${escapeHtml(new Date(list[0].year, list[0].month - 1, 1).toLocaleDateString("en-AU", { month: "long" }))}
                </div>
              </div>
            </div>
          </section>
        `).join("");

        content.querySelectorAll("[data-month]").forEach(el => {
          el.addEventListener("click", () => {
            photoNav.year = Number(el.dataset.year);
            photoNav.month = Number(el.dataset.month);
            photoNav.day = null;
            renderPhotosMode("days");
          });
        });
      }

      else if (view === "days") {
        if (photoNav.year && photoNav.month) {
          sorted = sorted.filter(entry => sameMonth(entry, photoNav.year, photoNav.month));
        }

        const byDay = groupEntriesBy(sorted, groupKeyDay);

        content.innerHTML = `
          <div class="photos-grid-days">
            ${byDay.map(([key, list]) => `
              <div class="photo-card" data-year="${list[0].year}" data-month="${list[0].month}" data-day="${list[0].day}">
                <div class="photo-card-image">
                  ${buildImgTag(list[0].mediaSmall, formatDate(list[0]), 'fetchpriority="low"')}
                </div>
                <div class="photo-card-meta">
                  <strong>${escapeHtml(new Date(list[0].year, list[0].month - 1, list[0].day).toLocaleDateString("en-AU", {
                    day: "numeric",
                    month: "long",
                    year: "numeric"
                  }))}</strong>
                  ${list.length} photo${list.length === 1 ? "" : "s"}
                </div>
              </div>
            `).join("")}
          </div>
        `;

        content.querySelectorAll("[data-day]").forEach(el => {
          el.addEventListener("click", () => {
            photoNav.year = Number(el.dataset.year);
            photoNav.month = Number(el.dataset.month);
            photoNav.day = Number(el.dataset.day);
            renderPhotosMode("all");
          });
        });
      }

      else {
        if (photoNav.year && photoNav.month && photoNav.day) {
          sorted = sorted.filter(entry => sameDay(entry, photoNav.year, photoNav.month, photoNav.day));
        }

        content.innerHTML = `
          <div class="photos-grid-all">
            ${sorted.map(entry => `
              <div class="photo-card" data-src="${escapeHtml(entry.mediaLarge)}" data-alt="${escapeHtml(entry.headline)}">
                <div class="photo-card-image">
                  ${buildImgTag(entry.mediaSmall, entry.headline, 'fetchpriority="low"')}
                </div>
                <div class="photo-card-meta">
                  <strong>${escapeHtml(entry.headline)}</strong>
                  ${escapeHtml(formatDate(entry))}
                </div>
              </div>
            `).join("")}
          </div>
        `;

        content.querySelectorAll("[data-src]").forEach(el => {
          el.addEventListener("click", () => {
            openLightbox(el.dataset.src, el.dataset.alt || "");
          });
        });
      }

      updatePhotosToolbar();
    }

    document.getElementById("prevBtn").addEventListener("click", async () => {
      currentIndex = Math.max(0, currentIndex - 1);
      renderEntry(currentIndex);
      scrollTimelineItemIntoView(currentIndex);
      const nextEntry = entries[Math.min(entries.length - 1, currentIndex + 1)];
      ensureEntryImage(nextEntry);
    });

    document.getElementById("nextBtn").addEventListener("click", async () => {
      currentIndex = Math.min(entries.length - 1, currentIndex + 1);
      renderEntry(currentIndex);
      scrollTimelineItemIntoView(currentIndex);
      const nextEntry = entries[Math.min(entries.length - 1, currentIndex + 1)];
      ensureEntryImage(nextEntry);
    });

    document.getElementById("spinBtn").addEventListener("click", () => {
      spinSlot(false);
    });

    document.getElementById("hardSpinBtn").addEventListener("click", () => {
      spinSlot(true);
    });

    document.getElementById("clearHoldsBtn").addEventListener("click", () => {
      reelState.forEach(r => r.held = false);
      updateHoldButtons();
    });

    const timelineMode = document.getElementById("timelineMode");
    const slotMode = document.getElementById("slotMode");
    const photosMode = document.getElementById("photosMode");
    const modeBadge = document.getElementById("modeBadge");

    const timelineModeBtn = document.getElementById("timelineModeBtn");
    const slotModeBtn = document.getElementById("slotModeBtn");
    const photosModeBtn = document.getElementById("photosModeBtn");

    function setMode(mode) {
      timelineMode.classList.toggle("hidden", mode !== "timeline");
      slotMode.classList.toggle("hidden", mode !== "slot");
      photosMode.classList.toggle("hidden", mode !== "photos");

      timelineModeBtn.classList.toggle("active-mode-btn", mode === "timeline");
      slotModeBtn.classList.toggle("active-mode-btn", mode === "slot");
      photosModeBtn.classList.toggle("active-mode-btn", mode === "photos");

      modeBadge.textContent =
        mode === "timeline" ? "Timeline Mode" :
        mode === "slot" ? "Explore / Slot Mode" :
        "Photos Mode";
    }

    timelineModeBtn.addEventListener("click", () => setMode("timeline"));
    slotModeBtn.addEventListener("click", () => setMode("slot"));
    photosModeBtn.addEventListener("click", () => setMode("photos"));

    document.querySelectorAll(".view-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const view = btn.dataset.view;

        if (view === "years") {
          photoNav.year = null;
          photoNav.month = null;
          photoNav.day = null;
        }

        if (view === "months") {
          photoNav.month = null;
          photoNav.day = null;
        }

        if (view === "days") {
          photoNav.day = null;
        }

        renderPhotosMode(view);
      });
    });

    document.getElementById("lightboxClose").addEventListener("click", closeLightbox);

    document.getElementById("lightbox").addEventListener("click", (e) => {
      if (e.target.id === "lightbox") {
        closeLightbox();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeLightbox();
      }
    });

    async function init() {
      try {
        entries = await loadSheetData();

        if (!entries.length) {
          document.getElementById("loadingMessage").textContent =
            "No rows found. Check PUBLISH tab, Filename column, and image folders.";
          return;
        }

        document.getElementById("loadingMessage").classList.add("hidden");
        document.getElementById("appShell").classList.remove("hidden");

        buildTimeline();
        renderEntry(0);
        buildSlotGrid();
        renderPhotosMode("years");

        for (let i = 0; i < reelCount; i++) {
          const entry = entries[i % entries.length];
          reelState[i].entry = entry;
          setReelVisual(i, entry);
        }

        updateHoldButtons();
        scrollTimelineItemIntoView(0);

        document.getElementById("mainImage").addEventListener("click", () => {
          if (!entries.length) return;
          const entry = entries[currentIndex];
          openLightbox(entry.mediaLarge, entry.headline);
        });

        await preloadEntriesImages(entries, 2);
        slotPreviewPool = sampleEntries(entries, 8);
      } catch (err) {
        const msg =
          err.name === "AbortError"
            ? "Timed out loading sheet data."
            : "Failed to load sheet data.";
        document.getElementById("loadingMessage").textContent = msg;
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
